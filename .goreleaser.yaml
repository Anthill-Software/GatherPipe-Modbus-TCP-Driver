version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: gatherpipe-driver-modbustcp
    main: ./cmd/driver/main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 6

archives:
  - name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}{{ .Arm }}"
    formats:
      - binary
